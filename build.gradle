plugins {
    id 'java-library'
}

group = 'mod.wurmunlimited.testing'
version = '1.0-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    api 'org.junit.jupiter:junit-jupiter-engine:5.3.1'
    api 'org.junit.platform:junit-platform-runner:1.1.0'
    api "org.mockito:mockito-inline:2.+"

    def wurmDir = 'V:/Wurm Server'

    compileOnly fileTree(dir: wurmDir, includes: ["server.jar", "modlauncher.jar", "javassist.jar"])
    compileOnly fileTree(dir: wurmDir + '/lib', includes: ["*.jar"])
}